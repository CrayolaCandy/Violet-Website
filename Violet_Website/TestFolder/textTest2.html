<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Anywhere to Type</title>
<link rel="stylesheet" href="textTest2.css">
<link rel="stylesheet" href="textTest2ChatLayout.css">
</head>
<body>
  <div class = "chatForm">
    <div class = "messageBox">

      <div class = "userInfo">
        <img src="/images/CrayolaCandyProfileImage.jpg" class = "userImage">
        <div class = "userName">
          <span>Jonathan</span>
        </div>
      </div>

      <div class = "messageInfo">
        <div class = "sentMessage">
        </div>
      </div>

    </div>
    <div class="inputBox">
      <div class="userInput" contenteditable="true" data-placeholder="Type your message here...">
        
      </div>
      <button class="submitButton">Submit</button>
    </div>
  </div>
  

  <script src = "textTest2.js"></script>

</body>
</html>
