<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D Grid Display</title>
  <style>
    body {
      font-family: monospace;
      background-color: #f4f4f4;
      padding: 40px;
    }
    table {
      border-collapse: collapse;
      margin: auto;
      margin-top: 20px;
    }
    td {
      width: 40px;
      height: 40px;
      text-align: center;
      vertical-align: middle;
      font-size: 24px;
      border: 1px solid #999;
    }
    caption {
      font-size: 20px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h2>2D Grid from Input Coordinates</h2>

  <table>
    <caption>y ↓ / x →</caption>
    <tr>
      <td>█</td><td> </td><td> </td><td> </td>
    </tr>
    <tr>
      <td>█</td><td>▓</td><td>▒</td><td> </td>
    </tr>
    <tr>
      <td>█</td><td>▓</td><td>▒</td><td>░</td>
    </tr>
  </table>

</body>
</html>
